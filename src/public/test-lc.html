<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>LeanCloud Test</title></head>
<body>
<h3>LeanCloud 连接测试</h3>
<pre id="log" style="background:#111;color:#0f0;padding:16px;font-family:monospace;white-space:pre-wrap;"></pre>
<script src="https://cdn.jsdelivr.net/npm/leancloud-storage@4.15.2/dist/av-min.js"></script>
<script>
const log = document.getElementById('log');
function pt(msg) { log.textContent += msg + '\n'; scrollTo(0, document.body.scrollHeight); }

pt('初始化...');
AV.init({
  appId: 'eX3nDnSKjEEHFtyyCU7ut1um-gzGzoHsz',
  appKey: 'vso9UDa0LlBvDEkh4NYjvCJL',
  serverURLs: 'https://ex3ndnsk.lc-cn-n1-shared.com'
});

pt('AppId: ' + AV._config.applicationId);
pt('AppKey: ' + AV._config.applicationKey.substring(0,6) + '...');
pt('Server: ' + (AV._config.serverURLs?.api || 'OK'));

async function test() {
  pt('\n--- 测试写入 Post ---');
  try {
    const Post = AV.Object.extend('Post');
    const p = new Post();
    p.set('title', '测试');
    p.set('content', '测试');
    p.set('tags', ['test']);
    p.set('description', 'test');
    p.set('status', 'draft');
    pt('  调用 save()...');
    const saved = await p.save();
    pt('  ✅ 保存成功! objectId=' + saved.id);
  } catch(e) {
    pt('  ❌ code=' + e.code + ' msg=' + e.message + ' status=' + e.statusCode);
  }

  pt('\n--- 测试读取 Post ---');
  try {
    const q = new AV.Query('Post');
    const results = await q.find();
    pt('  ✅ 读取成功! ' + results.length + ' 条');
  } catch(e) {
    pt('  ❌ code=' + e.code + ' msg=' + e.message);
  }
}

test().then(() => pt('\n=== 完成 ==='));
</script>
</body>
</html>
